services:
  - type: web
    name: newsstand-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        sync: false   # Set this secret in Render Dashboard → Environment
      - key: NAVER_CLIENT_ID
        sync: false   # Set this secret in Render Dashboard → Environment
      - key: NAVER_CLIENT_SECRET
        sync: false   # Set this secret in Render Dashboard → Environment
